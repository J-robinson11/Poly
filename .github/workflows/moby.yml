name: Moby

# Runs the smart-money scan 3x/day in the cloud — no local machine needed.
# NOTE: GitHub Actions cron is in UTC and does NOT observe Daylight Saving.
# GitHub's free scheduler typically fires ~1 hour LATE under load, so these
# times are intentionally set ~1h10m EARLIER than the target delivery time and
# off the top of the hour (:20) to reduce congestion/drift.
# Nominal fire (UTC) -> expected delivery (CDT = UTC-5, ~1h drift):
#   11:20 UTC -> ~7:20 AM CT | 16:20 UTC -> ~12:20 PM CT | 21:20 UTC -> ~5:20 PM CT
on:
  schedule:
    - cron: "20 11,16,21 * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

jobs:
  moby:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Moby
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # --- Alert channel: set ONE. Discord (free) is the default. ---
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          ALERT_TO_PHONE: ${{ secrets.ALERT_TO_PHONE }}
          # Optional overrides (uncomment to change):
          # ANTHROPIC_MODEL: claude-sonnet-4-6
          # MARKET_TAG: world-cup
          # MARKET_CAP: "40"
          # MIN_SMART_MONEY_USD: "2000"
        run: python moby.py

      # Notify Discord if any step above failed, so you know to check the logs.
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          TRIGGER: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          NOW_UTC="$(date -u '+%Y-%m-%d %H:%M UTC')"
          COMMIT_LINE="$(printf '%s' "$COMMIT_MSG" | head -n1)"
          jq -n \
            --arg run_url "$RUN_URL" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg attempt "$RUN_ATTEMPT" \
            --arg trigger "$TRIGGER" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg commit "$COMMIT_LINE" \
            --arg now "$NOW_UTC" \
            '{
              username: "Moby",
              embeds: [{
                title: "⚠️ Moby run FAILED",
                description: ("The scheduled Moby job did not complete. No alert was sent this run — check the logs and fix.\n\n**[➡ Open the run logs](" + $run_url + ")**"),
                color: 15158332,
                fields: [
                  {name: "Repository", value: $repo, inline: true},
                  {name: "Run #",      value: ("`" + $run_id + "`  (attempt " + $attempt + ")"), inline: true},
                  {name: "Triggered by", value: $trigger, inline: true},
                  {name: "Branch",     value: $branch, inline: true},
                  {name: "Commit",     value: ("`" + $sha + "`"), inline: true},
                  {name: "Failed at",  value: $now, inline: true},
                  {name: "Latest commit", value: (if $commit == "" then "n/a" else $commit end), inline: false},
                  {name: "Likely causes", value: "• Anthropic API error or out of credit\n• Polymarket Gamma/Data API hiccup\n• Model output could not be parsed as JSON", inline: false}
                ],
                footer: {text: "Moby · automated failure alert"}
              }]
            }' \
          | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
