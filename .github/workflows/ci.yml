name: CI checks

# Fast sanity checks on every push so broken code never reaches a scheduled run.
on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check the script
        run: python -m py_compile moby.py

      - name: Import + smoke-test (no network, no API calls)
        run: |
          python - <<'PY'
          import moby

          # 1. The module imports cleanly and key functions exist.
          for fn in ("clean_markets", "summarize_holders", "parse_json_block",
                     "build_discord_payload", "send_alert", "log_signals",
                     "flatten_picks", "load_track_record", "fetch_x_sentiment",
                     "fetch_sharp_traders", "sharp_weight"):
              assert hasattr(moby, fn), f"missing function: {fn}"

          # 2. Market classification works.
          assert moby.classify_market("Argentina vs Brazil total goals", "")[1] == "game_prop"
          assert moby.classify_market("Messi to score anytime", "")[1] == "player_prop"
          assert moby.classify_market("Brazil to win the World Cup", "")[1] == "future"

          # 3. Holder summary computes dollar-weighted lean correctly.
          market = {"outcomes": ["Yes", "No"], "implied_prob": [0.8, 0.2]}
          raw = [
              {"token": "yes", "holders": [
                  {"outcomeIndex": 0, "amount": 1000, "name": "Whale"},
              ]},
              {"token": "no", "holders": [
                  {"outcomeIndex": 1, "amount": 1000, "name": "Minnow"},
              ]},
          ]
          s = moby.summarize_holders(market, raw)
          # Yes: 1000 * 0.8 = 800; No: 1000 * 0.2 = 200 -> lean Yes ~80%
          assert s["lean_side"] == "Yes", s
          assert 75 <= s["lean_pct"] <= 85, s
          assert s["total_smart_money_usd"] == 1000, s

          # 3b. Sharp weighting: a high-PnL whale on the smaller side flips the
          #     SHARP lean even when raw money leans the other way.
          mk = {"outcomes": ["Yes", "No"], "implied_prob": [0.8, 0.2]}
          raw2 = [
              {"holders": [{"outcomeIndex": 0, "amount": 1000, "proxyWallet": "0xAAA"}]},
              {"holders": [{"outcomeIndex": 1, "amount": 2000, "proxyWallet": "0xBBB", "name": "Sharp"}]},
          ]
          sharp = {"0xbbb": {"pnl": 2_000_000, "name": "Theo4", "rank": "1"}}
          s2 = moby.summarize_holders(mk, raw2, sharp)
          assert s2["lean_side"] == "Yes", s2          # raw money on Yes
          assert s2["sharp_lean_side"] == "No", s2     # sharp money flips to No
          assert s2["sharp_traders_present"] == 1, s2
          assert moby.sharp_weight(2_000_000) == 4.0
          assert moby.sharp_weight(None) == 1.0

          # 4. JSON parsing handles a fenced block like the model returns.
          sample = '''Here is my read.
          ```json
          {"picks": {"game_props": [], "player_props": [], "futures": []},
           "watchlist": ["USA props"], "summary": "Quiet."}
          ```'''
          parsed = moby.parse_json_block(sample)
          assert parsed["summary"] == "Quiet."
          assert moby.flatten_picks(parsed) == []

          # 5. Discord payload builds for no-pick and full slates without any
          #    empty field values (Discord rejects empty fields).
          no_pick = moby.build_discord_payload(parsed)
          assert no_pick["embeds"][0]["title"]

          full = {"picks": {
              "game_props": [{
                  "market": "Argentina vs Brazil — total goals over 2.5",
                  "pick": "Over 2.5", "conviction": "High", "kickoff": "2026-06-29T18:00:00Z",
                  "smart_money": "72% of $45k on Over", "news": "Both teams attacking form.",
                  "rationale": "Big money + news agree.", "contrarian_note": "Defensive history.",
              }],
              "player_props": [{"market": "Messi to score", "pick": "Yes", "conviction": "Medium"}],
              "futures": [],
          }, "summary": "Two plays today.", "_track_record": {"note": "3/4 won (75%)."}}
          flat = moby.flatten_picks(full)
          assert len(flat) == 2 and flat[0]["bucket"] == "game_props", flat
          payload = moby.build_discord_payload(full)
          for embed in payload["embeds"]:
              for field in embed.get("fields", []):
                  assert field["value"] != "", f"empty field: {field['name']}"

          print("All smoke tests passed.")
          PY
