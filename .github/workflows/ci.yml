name: CI checks

# Fast sanity checks on every push so broken code never reaches a scheduled run.
on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check the script
        run: python -m py_compile moby.py

      - name: Import + smoke-test (no network, no API calls)
        run: |
          python - <<'PY'
          import moby

          # 1. The module imports cleanly and key functions exist.
          for fn in ("clean_markets", "summarize_holders", "parse_json_block",
                     "build_discord_payload", "send_alert", "log_signals"):
              assert hasattr(moby, fn), f"missing function: {fn}"

          # 2. Market classification works.
          assert moby.classify_market("Argentina vs Brazil total goals", "")[1] == "game_prop"
          assert moby.classify_market("Messi to score anytime", "")[1] == "player_prop"
          assert moby.classify_market("Brazil to win the World Cup", "")[1] == "future"

          # 3. Holder summary computes dollar-weighted lean correctly.
          market = {"outcomes": ["Yes", "No"], "implied_prob": [0.8, 0.2]}
          raw = [
              {"token": "yes", "holders": [
                  {"outcomeIndex": 0, "amount": 1000, "name": "Whale"},
              ]},
              {"token": "no", "holders": [
                  {"outcomeIndex": 1, "amount": 1000, "name": "Minnow"},
              ]},
          ]
          s = moby.summarize_holders(market, raw)
          # Yes: 1000 * 0.8 = 800; No: 1000 * 0.2 = 200 -> lean Yes ~80%
          assert s["lean_side"] == "Yes", s
          assert 75 <= s["lean_pct"] <= 85, s
          assert s["total_smart_money_usd"] == 1000, s

          # 4. JSON parsing handles a fenced block like the model returns.
          sample = '''Here is my read.
          ```json
          {"signals": [], "watchlist": ["USA props"], "summary": "Quiet."}
          ```'''
          parsed = moby.parse_json_block(sample)
          assert parsed["summary"] == "Quiet."

          # 5. Discord payload builds for no-signal and signal cases without
          #    any empty field values (Discord rejects empty fields).
          no_sig = moby.build_discord_payload(parsed)
          assert no_sig["embeds"][0]["title"]

          full = {"signals": [{
              "market": "Argentina vs Brazil — total goals over 2.5",
              "smart_money_side": "Over 2.5",
              "lean_pct": 72,
              "total_smart_money_usd": 45000,
              "conviction": "High",
              "top_holders": "Theo4 $20k on Over",
              "sentiment": "Big money piling on a high-scoring game.",
              "contrarian_note": "Defensive matchup history.",
          }], "summary": "One strong signal."}
          payload = moby.build_discord_payload(full)
          for embed in payload["embeds"]:
              for field in embed.get("fields", []):
                  assert field["value"] != "", f"empty field: {field['name']}"

          # 6. A signal with MISSING fields must still build safely.
          sparse = {"signals": [{
              "market": "X", "smart_money_side": "Yes",
          }], "summary": "sparse"}
          sp = moby.build_discord_payload(sparse)
          for embed in sp["embeds"]:
              for field in embed.get("fields", []):
                  assert field["value"] != "", f"empty field on sparse: {field['name']}"

          print("All smoke tests passed.")
          PY
