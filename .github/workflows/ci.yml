name: CI checks

# Fast sanity checks on every push so broken code never reaches a scheduled run.
on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check the script
        run: python -m py_compile value_scout.py

      - name: Import + smoke-test (no network, no API calls)
        run: |
          python - <<'PY'
          import json
          import value_scout as vs

          # 1. The module imports cleanly and key functions exist.
          for fn in ("clean_markets", "parse_json_block", "build_discord_payload",
                     "build_sms", "log_bets"):
              assert hasattr(vs, fn), f"missing function: {fn}"

          # 2. JSON parsing handles a fenced block like the model returns.
          sample = '''Here is my analysis.
          ```json
          {"flagged": [], "near_misses": ["Brazil R16 close"], "summary": "Nothing clears the bar."}
          ```'''
          parsed = vs.parse_json_block(sample)
          assert parsed["summary"] == "Nothing clears the bar."
          assert parsed["near_misses"] == ["Brazil R16 close"]

          # 3. Discord payload builds for both the no-bet and flagged-bet cases
          #    without raising (and without any empty field values).
          no_bet = vs.build_discord_payload(parsed)
          assert no_bet["embeds"][0]["title"]

          flagged = {
              "flagged": [{
                  "market": "Brazil to advance",
                  "outcome": "Yes",
                  "polymarket_ask_pct": 62,
                  "fair_pct": 68,
                  "edge_pp": 6.0,
                  "confidence": "High",
                  "sources": ["https://example.com"],
                  "case_for": "Strong form.",
                  "case_against": "Tough draw.",
              }],
              "summary": "One bet flagged.",
          }
          payload = vs.build_discord_payload(flagged)
          for embed in payload["embeds"]:
              for field in embed.get("fields", []):
                  assert field["value"] != "", f"empty Discord field: {field['name']}"

          # 4. A flagged bet with MISSING case_for/sources must still build safely
          #    (this is the bug we fixed — empty values crash Discord).
          sparse = {"flagged": [{
              "market": "X", "outcome": "Y", "polymarket_ask_pct": 50,
              "fair_pct": 60, "edge_pp": 10, "confidence": "Low",
          }], "summary": "sparse"}
          sparse_payload = vs.build_discord_payload(sparse)
          for embed in sparse_payload["embeds"]:
              for field in embed.get("fields", []):
                  assert field["value"] != "", f"empty field on sparse bet: {field['name']}"

          print("All smoke tests passed.")
          PY
