name: Poly

# Runs the scan 3x/day in the cloud — no local machine needed.
# NOTE: GitHub Actions cron is in UTC and does NOT observe Daylight Saving.
# Times below are set for US Central during the 2026 World Cup (CDT = UTC-5):
#   7:30 AM CT = 12:30 UTC | 12:30 PM CT = 17:30 UTC | 5:30 PM CT = 22:30 UTC
# If you're in another timezone, or after DST changes, adjust the hours.
on:
  schedule:
    - cron: "30 12,17,22 * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Poly
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # --- Alert channel: set ONE. Discord (free) is the default. ---
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Or use ntfy.sh (free, no signup) instead of Discord:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # Or paid SMS via Twilio:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          ALERT_TO_PHONE: ${{ secrets.ALERT_TO_PHONE }}
          # Optional overrides (uncomment to change):
          # ANTHROPIC_MODEL: claude-sonnet-4-6
          # MARKET_TAG: world-cup
          # MIN_EDGE_PP: "4"
        run: python value_scout.py

      # Notify Discord if any step above failed, so you know to check the logs.
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          TRIGGER: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          NOW_UTC="$(date -u '+%Y-%m-%d %H:%M UTC')"
          # First commit subject line only, JSON-escaped for safety.
          COMMIT_LINE="$(printf '%s' "$COMMIT_MSG" | head -n1)"
          # Build the payload with jq so all fields are safely escaped.
          jq -n \
            --arg run_url "$RUN_URL" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg attempt "$RUN_ATTEMPT" \
            --arg trigger "$TRIGGER" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg sha "$SHORT_SHA" \
            --arg commit "$COMMIT_LINE" \
            --arg now "$NOW_UTC" \
            '{
              username: "Poly",
              embeds: [{
                title: "⚠️ Poly run FAILED",
                description: ("The scheduled Poly job did not complete. No alert was sent this run — check the logs and fix.\n\n**[➡ Open the run logs](" + $run_url + ")**"),
                color: 15158332,
                fields: [
                  {name: "Repository", value: $repo, inline: true},
                  {name: "Run #",      value: ("`" + $run_id + "`  (attempt " + $attempt + ")"), inline: true},
                  {name: "Triggered by", value: $trigger, inline: true},
                  {name: "Branch",     value: $branch, inline: true},
                  {name: "Commit",     value: ("`" + $sha + "`"), inline: true},
                  {name: "Failed at",  value: $now, inline: true},
                  {name: "Latest commit", value: (if $commit == "" then "n/a" else $commit end), inline: false},
                  {name: "Likely causes", value: "• Anthropic API error or out of credit\n• Polymarket API/network hiccup\n• Model output could not be parsed as JSON", inline: false}
                ],
                footer: {text: "Poly · automated failure alert"}
              }]
            }' \
          | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
